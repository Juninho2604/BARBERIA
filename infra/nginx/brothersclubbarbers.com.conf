# Nginx reverse proxy para brothersclubbarbers.com.
# Vive en: /etc/nginx/sites-available/brothersclubbarbers.com.conf
# Symlink en: /etc/nginx/sites-enabled/brothersclubbarbers.com.conf
#
# Esquema:
#   /api/*  → API Fastify en 127.0.0.1:4000 (contenedor `barberia-api`)
#   /*      → Next.js en 127.0.0.1:3100     (contenedor `barberia-web`)
#
# IMPORTANTE: este VPS aloja varios sitios (capsula-erp, tablepongve,
# n8n, mail-tenari, etc.). Nginx, certbot y `options-ssl-nginx.conf` ya
# están instalados y configurados. Este vhost solo se AÑADE — no toca
# nada existente.
#
# Certificados via `certbot certonly --nginx` para
# brothersclubbarbers.com + www. Renovación automática por el systemd
# timer `certbot.timer` que ya está activo en el host.

# Redirección HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name brothersclubbarbers.com www.brothersclubbarbers.com;

    # Mantenemos el path bajo .well-known/acme-challenge/* para que certbot
    # pueda renovar sin caer la redirección.
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }
    location / {
        return 301 https://brothersclubbarbers.com$request_uri;
    }
}

# Canónico HTTPS — todo el tráfico real
server {
    # `listen 443 ssl http2` (sintaxis combinada) en vez de la nueva
    # `http2 on;` directive — el Nginx del host (1.24) todavía no la
    # soporta. Misma convención que kpsula.app y resto de vhosts del VPS.
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name brothersclubbarbers.com;

    # Certbot escribe estas dos líneas al correr `--nginx`. Las dejamos
    # como placeholder para que el config sea legible aunque el cert no
    # exista todavía (sin esto nginx -t falla).
    ssl_certificate     /etc/letsencrypt/live/brothersclubbarbers.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brothersclubbarbers.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (helmet en API + estos en host)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Body grande para futuras subidas (foto barbero). Hoy bastaba 1M.
    client_max_body_size 10M;

    # gzip básico — Next ya envía precompresion en assets estáticos, pero
    # esto ayuda al HTML y al JSON del API.
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types application/json application/javascript text/css text/html text/xml image/svg+xml application/xml;

    # ---- API (Fastify) ----
    location /api/ {
        # Strip /api del path para que Fastify reciba /services, /auth/login, etc.
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ---- Next.js (web) ----
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}

# www → apex (canonicalización)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.brothersclubbarbers.com;

    ssl_certificate     /etc/letsencrypt/live/brothersclubbarbers.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brothersclubbarbers.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://brothersclubbarbers.com$request_uri;
}
