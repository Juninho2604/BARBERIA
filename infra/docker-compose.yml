name: barberia

services:
  postgres:
    image: postgres:16-alpine
    container_name: barberia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: barberia
      POSTGRES_PASSWORD: barberia_dev
      POSTGRES_DB: barberia
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barberia -d barberia"]
      interval: 5s
      timeout: 5s
      retries: 10
